<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HominisAI - Soon in your life</title>
    <style>
        /* Sfondo nero e impostazioni generali */
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #000000; 
            color: #ffffff; 
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .content {
            text-align: center;
            padding: 20px;
        }

        /* Logo - Dimensione 500px */
        img {
            width: 100%;
            max-width: 500px; 
            height: auto;
            margin-bottom: 5px;
        }

        /* Testo aggiornato e avvicinato al logo */
        h1 {
            font-weight: 300;
            letter-spacing: 1px;
            margin-top: 0;
            margin-bottom: 40px;
            font-size: 1.3rem;
            color: #eeeeee;
        }

        /* Tasto Contatti */
        .btn-contact {
            display: inline-block;
            background-color: #ffffff;
            color: #000000;
            text-decoration: none;
            padding: 12px 30px;
            font-weight: bold;
            border-radius: 5px;
            font-size: 1rem;
            transition: transform 0.2s, opacity 0.2s;
        }

        .btn-contact:hover {
            opacity: 0.9;
            transform: scale(1.05);
        }

        /* Link email testuale piccolo sotto */
        .email-footer {
            display: block;
            margin-top: 20px;
            color: #555555;
            text-decoration: none;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>

    <div class="content">
        <!-- Il logo deve essere nella stessa cartella -->
        <img src="Logo HominisAI.png" alt="HominisAI Logo">
        <h1>in your life soon, you won't even notice
</h1>

        <!-- Tasto che apre la mail predefinita -->
        <a href="mailto:info@hominisai.ai" class="btn-contact">Contact Us</a>

        <a href="mailto:info@hominisai.ai" class="email-footer">info@hominisai.ai</a>
    </div>

</body>
</html>
